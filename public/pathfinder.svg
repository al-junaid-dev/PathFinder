<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">

  <!-- Background (Premium Black Rounded Square) -->
  <rect x="10" y="10" width="180" height="180" rx="40" fill="#0B0B0B"/>

  <!-- Compass Outer Ring -->
  <circle cx="100" cy="100" r="50"
          stroke="#F5F5F5"
          stroke-width="8"
          fill="none"/>

  <!-- Compass Needle (Tilted Diamond Style) -->
  <g transform="rotate(25 100 100)">
    <polygon points="100,70 115,100 100,130 85,100"
             fill="none"
             stroke="#F5F5F5"
             stroke-width="6"
             stroke-linejoin="round"/>
  </g>

</svg>
